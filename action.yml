name: 'DiffDoc Delta Summarizer'
description: 'Automated, token-efficient repository code summarization and validation pipeline.'
author: 'sullyTheDev'
branding:
  icon: 'git-commit'
  color: 'blue'

inputs:
  openai-api-key:
    description: 'The OpenAI-compatible API key (optional if using an unauthenticated local LLM).'
    required: false
  config-path:
    description: 'Path to the .diffdocrc JSON config file'
    required: false
  base-dir:
    description: 'DiffDoc artifact directory path override'
    required: false
  ai-provider:
    description: 'AI provider override: local or cloud'
    required: false

  # Chat & Model Customizations
  local-llm-endpoint:
    description: 'Local OpenAI-compatible chat endpoint URL'
    required: false
  local-chat-model:
    description: 'Local chat model name'
    required: false
  cloud-llm-endpoint:
    description: 'Cloud OpenAI-compatible chat endpoint URL'
    required: false
  cloud-chat-model:
    description: 'Cloud chat model name'
    required: false

  # Ingestion & Summarize Execution Tweaks
  scan-path:
    description: 'Repository or code path to scan'
    required: false
    default: '.'
  manifest-out:
    description: 'Manifest output filename/path under --base-dir'
    required: false
    default: 'manifest.json'
  summarize-concurrency:
    description: 'Number of files to summarize concurrently'
    required: false
  commit-message:
    description: 'The commit message used when pushing updated summaries'
    required: false
    default: 'chore(diffdoc): automated delta summary update [skip ci]'

outputs:
  files-updated:
    description: 'Number of files summarized/updated'
    value: ${{ steps.summarize.outputs.files-updated }}
  files-pruned:
    description: 'Number of manifest entries pruned'
    value: ${{ steps.prune.outputs.files-pruned }}
  files-failed:
    description: 'Number of files that failed summarization'
    value: ${{ steps.summarize.outputs.files-failed }}
  commit-sha:
    description: 'SHA of the auto-commit (empty if no changes)'
    value: ${{ steps.commit.outputs.commit_hash }}

runs:
  using: 'composite'
  steps:
    - name: Verify Git Repository
      shell: bash
      run: |
        if [ ! -d ".git" ]; then
          echo "::error::No .git directory found. Please add 'actions/checkout' with 'fetch-depth: 0' before this action."
          exit 1
        fi
        COMMIT_COUNT=$(git rev-list --count --all 2>/dev/null || echo "0")
        if [ "$COMMIT_COUNT" -le "1" ]; then
          echo "::error::Shallow clone detected (fetch-depth: 1). Delta mode requires git history to compute diffs. Use 'fetch-depth: 0' in actions/checkout."
          exit 1
        fi

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Validate Existing Manifest Architecture
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        AI_PROVIDER: ${{ inputs.ai-provider }}
        DIFFDOC_BASE_DIR: ${{ inputs.base-dir }}
        LOCAL_LLM_ENDPOINT: ${{ inputs.local-llm-endpoint }}
        LOCAL_CHAT_MODEL: ${{ inputs.local-chat-model }}
        CLOUD_LLM_ENDPOINT: ${{ inputs.cloud-llm-endpoint }}
        CLOUD_CHAT_MODEL: ${{ inputs.cloud-chat-model }}
      run: |
        echo "Executing DiffDoc contract validation layer..."
        ARGS=(validate --json)
        if [ -n "${{ inputs.config-path }}" ]; then ARGS+=(--config "${{ inputs.config-path }}"); fi
        if [ -n "${{ inputs.base-dir }}" ]; then ARGS+=(--base-dir "${{ inputs.base-dir }}"); fi
        if [ -n "${{ inputs.ai-provider }}" ]; then ARGS+=(--ai-provider "${{ inputs.ai-provider }}"); fi
        npx --yes diffdoc "${ARGS[@]}" || echo "Validation skipped or no existing manifest found for greenfield initialization."

    - name: Execute Token-Efficient Delta Summarize
      id: summarize
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        AI_PROVIDER: ${{ inputs.ai-provider }}
        DIFFDOC_BASE_DIR: ${{ inputs.base-dir }}
        LOCAL_LLM_ENDPOINT: ${{ inputs.local-llm-endpoint }}
        LOCAL_CHAT_MODEL: ${{ inputs.local-chat-model }}
        CLOUD_LLM_ENDPOINT: ${{ inputs.cloud-llm-endpoint }}
        CLOUD_CHAT_MODEL: ${{ inputs.cloud-chat-model }}
      run: |
        ARGS=(summarize --mode delta --json)
        if [ -n "${{ inputs.config-path }}" ]; then ARGS+=(--config "${{ inputs.config-path }}"); fi
        if [ -n "${{ inputs.base-dir }}" ]; then ARGS+=(--base-dir "${{ inputs.base-dir }}"); fi
        if [ -n "${{ inputs.ai-provider }}" ]; then ARGS+=(--ai-provider "${{ inputs.ai-provider }}"); fi
        if [ -n "${{ inputs.local-llm-endpoint }}" ]; then ARGS+=(--local-llm-endpoint "${{ inputs.local-llm-endpoint }}"); fi
        if [ -n "${{ inputs.local-chat-model }}" ]; then ARGS+=(--local-chat-model "${{ inputs.local-chat-model }}"); fi
        if [ -n "${{ inputs.cloud-llm-endpoint }}" ]; then ARGS+=(--cloud-llm-endpoint "${{ inputs.cloud-llm-endpoint }}"); fi
        if [ -n "${{ inputs.cloud-chat-model }}" ]; then ARGS+=(--cloud-chat-model "${{ inputs.cloud-chat-model }}"); fi
        if [ -n "${{ inputs.scan-path }}" ]; then ARGS+=(--path "${{ inputs.scan-path }}"); fi
        if [ -n "${{ inputs.manifest-out }}" ]; then ARGS+=(--out "${{ inputs.manifest-out }}"); fi
        if [ -n "${{ inputs.summarize-concurrency }}" ]; then ARGS+=(--summarize-concurrency "${{ inputs.summarize-concurrency }}"); fi

        echo "Running delta processing pipeline..."
        TMPFILE=$(mktemp)
        set +e
        npx --yes diffdoc "${ARGS[@]}" > "$TMPFILE" 2>&1
        EXIT_CODE=$?
        set -e
        cat "$TMPFILE"
        if [ "$EXIT_CODE" -ne 0 ]; then
          echo "::error::DiffDoc summarize failed with exit code $EXIT_CODE"
          rm -f "$TMPFILE"
          exit $EXIT_CODE
        fi
        echo "files-updated=$(jq -r '.totals.updated' "$TMPFILE")" >> "$GITHUB_OUTPUT"
        echo "files-failed=$(jq -r '.totals.failed' "$TMPFILE")" >> "$GITHUB_OUTPUT"
        rm -f "$TMPFILE"

    - name: Prune Extraneous Manifest Records
      id: prune
      shell: bash
      env:
        AI_PROVIDER: ${{ inputs.ai-provider }}
        DIFFDOC_BASE_DIR: ${{ inputs.base-dir }}
      run: |
        ARGS=(prune --yes --json)
        if [ -n "${{ inputs.config-path }}" ]; then ARGS+=(--config "${{ inputs.config-path }}"); fi
        if [ -n "${{ inputs.base-dir }}" ]; then ARGS+=(--base-dir "${{ inputs.base-dir }}"); fi
        if [ -n "${{ inputs.scan-path }}" ]; then ARGS+=(--path "${{ inputs.scan-path }}"); fi
        if [ -n "${{ inputs.manifest-out }}" ]; then ARGS+=(--manifest "${{ inputs.manifest-out }}"); fi

        echo "Cleaning stale entries from summary manifest mapping..."
        TMPFILE=$(mktemp)
        set +e
        npx --yes diffdoc "${ARGS[@]}" > "$TMPFILE" 2>&1
        EXIT_CODE=$?
        set -e
        cat "$TMPFILE"
        if [ "$EXIT_CODE" -ne 0 ]; then
          echo "::error::DiffDoc prune failed with exit code $EXIT_CODE"
          rm -f "$TMPFILE"
          exit $EXIT_CODE
        fi
        echo "files-pruned=$(jq -r '.manifestEntriesRemoved' "$TMPFILE")" >> "$GITHUB_OUTPUT"
        rm -f "$TMPFILE"

    - name: Commit and Push Updated Summaries
      id: commit
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: ${{ inputs.commit-message }}
        file_pattern: '${{ inputs.base-dir || ''.diffdoc'' }}/**'
